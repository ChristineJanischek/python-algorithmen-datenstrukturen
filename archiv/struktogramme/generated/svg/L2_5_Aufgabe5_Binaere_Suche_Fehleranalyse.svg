<svg xmlns="http://www.w3.org/2000/svg" 
     width="700" 
     height="650" 
     viewBox="0 0 700 650">
  
  <style>
    .box { stroke: #000; stroke-width: 2; fill: #fff; }
    .text { font-family: Arial, sans-serif; font-size: 13px; fill: #000; }
    .label { font-size: 11px; fill: #666; }
    .bold { font-weight: bold; }
  </style>
  
  <!-- Titel -->
  <text x="350" y="30" class="text bold" text-anchor="middle" font-size="16">Aufgabe 5: Binäre Suche prüfen</text>
  <line x1="30" y1="50" x2="670" y2="50" stroke="#000" stroke-width="1"/>
  
  <!-- PROZESS -->
  <rect x="50" y="80" width="600" height="50" class="box"/>
  
  <!-- Bezeichnung -->
  <text x="60" y="98" class="text label">Deklaration und Initialisierung:</text>
  
  <!-- Text -->
  <text x="60" y="115" class="text">links = 0</text>
  <!-- PROZESS -->
  <rect x="50" y="130" width="600" height="50" class="box"/>
  
  <!-- Bezeichnung -->
  <text x="60" y="148" class="text label">Deklaration und Initialisierung:</text>
  
  <!-- Text -->
  <text x="60" y="165" class="text">rechts = Anzahl der Elemente des Arrays codes - 1</text>
  <!-- PROZESS -->
  <rect x="50" y="180" width="600" height="50" class="box"/>
  
  <!-- Bezeichnung -->
  <text x="60" y="198" class="text label">Deklaration und Initialisierung:</text>
  
  <!-- Text -->
  <text x="60" y="215" class="text">gefunden = falsch</text>
  <!-- WHILE-SCHLEIFE (umgedrehtes L) -->
  <!-- Schleifenkopf -->
  <rect x="50" y="230" width="600" height="40" class="box"/>
  <text x="60" y="255" class="text">Wiederhole solange links &lt;= rechts AND NOT gefunden</text>
  
  <line x1="50" y1="270" x2="50" y2="500" stroke="#000" stroke-width="2"/>
  <!-- PROZESS -->
  <rect x="70" y="270" width="580" height="50" class="box"/>
  
  <!-- Bezeichnung -->
  <text x="80" y="288" class="text label">Deklaration und Initialisierung:</text>
  
  <!-- Text -->
  <text x="80" y="305" class="text">mitte = (links + rechts) // 2</text>
  <!-- ALTERNATIVE (Briefumschlag - BW-Standard) -->
  <!-- Äußeres Rechteck -->
  <rect x="70" y="320" width="580" height="180" class="box"/>
  
  <!-- Eingebettetes Dreieck (Hypotenuse oben, Spitze unten) -->
  <polygon points="70,320 650,320 360,360" 
           fill="#fff" stroke="#000" stroke-width="2"/>
  
  <!-- Bedingung im Dreieck (obere Hälfte) -->
  <text x="360" y="338" class="text" text-anchor="middle">codes[mitte] == ziel</text>
  
  <line x1="360" y1="360" x2="360" y2="500" stroke="#000" stroke-width="2"/>
  <text x="80" y="375" class="text bold">J</text>
  <text x="370" y="375" class="text bold">N</text>
  <!-- PROZESS -->
  <rect x="85" y="380" width="265" height="50" class="box"/>
  
  <!-- Bezeichnung -->
  <text x="95" y="398" class="text label">Zuweisung:</text>
  
  <!-- Text -->
  <text x="95" y="415" class="text">gefunden = wahr</text>
  <!-- ALTERNATIVE (Briefumschlag - BW-Standard) -->
  <!-- Äußeres Rechteck -->
  <rect x="375" y="380" width="265" height="120" class="box"/>
  
  <!-- Eingebettetes Dreieck (Hypotenuse oben, Spitze unten) -->
  <polygon points="375,380 640,380 507,420" 
           fill="#fff" stroke="#000" stroke-width="2"/>
  
  <!-- Bedingung im Dreieck (obere Hälfte) -->
  <text x="507" y="398" class="text" text-anchor="middle">codes[mitte] &lt; ziel</text>
  
  <line x1="507" y1="420" x2="507" y2="500" stroke="#000" stroke-width="2"/>
  <text x="385" y="435" class="text bold">J</text>
  <text x="517" y="435" class="text bold">N</text>
  <!-- PROZESS -->
  <rect x="390" y="440" width="107" height="50" class="box"/>
  
  <!-- Bezeichnung -->
  <text x="400" y="458" class="text label">Zuweisung:</text>
  
  <!-- Text -->
  <text x="400" y="475" class="text">rechts = mitte - 1</text>
  <!-- PROZESS -->
  <rect x="522" y="440" width="107" height="50" class="box"/>
  
  <!-- Bezeichnung -->
  <text x="532" y="458" class="text label">Zuweisung:</text>
  
  <!-- Text -->
  <text x="532" y="475" class="text">links = mitte + 1</text>
  <line x1="50" y1="500" x2="650" y2="500" stroke="#000" stroke-width="2"/>
  <!-- ALTERNATIVE (Briefumschlag - BW-Standard) -->
  <!-- Äußeres Rechteck -->
  <rect x="50" y="500" width="600" height="120" class="box"/>
  
  <!-- Eingebettetes Dreieck (Hypotenuse oben, Spitze unten) -->
  <polygon points="50,500 650,500 350,540" 
           fill="#fff" stroke="#000" stroke-width="2"/>
  
  <!-- Bedingung im Dreieck (obere Hälfte) -->
  <text x="350" y="518" class="text" text-anchor="middle">gefunden</text>
  
  <line x1="350" y1="540" x2="350" y2="620" stroke="#000" stroke-width="2"/>
  <text x="60" y="555" class="text bold">J</text>
  <text x="360" y="555" class="text bold">N</text>
  <!-- AUSGABE -->
  <rect x="65" y="560" width="275" height="50" class="box"/>
  
  <!-- Bezeichnung -->
  <text x="75" y="578" class="text label">Ausgabe:</text>
  
  <!-- Text -->
  <text x="75" y="595" class="text">Treffer</text>
  <!-- AUSGABE -->
  <rect x="365" y="560" width="275" height="50" class="box"/>
  
  <!-- Bezeichnung -->
  <text x="375" y="578" class="text label">Ausgabe:</text>
  
  <!-- Text -->
  <text x="375" y="595" class="text">Kein Treffer</text>
</svg>