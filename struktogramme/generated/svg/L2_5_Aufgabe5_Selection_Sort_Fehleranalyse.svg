<svg xmlns="http://www.w3.org/2000/svg" 
     width="700" 
     height="670" 
     viewBox="0 0 700 670">
  
  <style>
    .box { stroke: #000; stroke-width: 2; fill: #fff; }
    .text { font-family: Arial, sans-serif; font-size: 13px; fill: #000; }
    .label { font-size: 11px; fill: #666; }
    .bold { font-weight: bold; }
  </style>
  
  <!-- Titel -->
  <text x="350" y="30" class="text bold" text-anchor="middle" font-size="16">Aufgabe 5: Selection Sort prüfen</text>
  <line x1="30" y1="50" x2="670" y2="50" stroke="#000" stroke-width="1"/>
  
  <!-- PROZESS -->
  <rect x="50" y="80" width="600" height="50" class="box"/>
  
  <!-- Bezeichnung -->
  <text x="60" y="98" class="text label">Deklaration und Initialisierung:</text>
  
  <!-- Text -->
  <text x="60" y="115" class="text">n = Anzahl der Elemente des Arrays werte</text>
  <!-- FOR-SCHLEIFE (umgedrehtes L) -->
  <rect x="50" y="130" width="600" height="40" class="box"/>
  <text x="60" y="155" class="text">Zähle i von 0 bis n, Schrittweite 1</text>
  
  <line x1="50" y1="170" x2="50" y2="590" stroke="#000" stroke-width="2"/>
  <!-- PROZESS -->
  <rect x="70" y="170" width="580" height="50" class="box"/>
  
  <!-- Bezeichnung -->
  <text x="80" y="188" class="text label">Deklaration und Initialisierung:</text>
  
  <!-- Text -->
  <text x="80" y="205" class="text">min_index = i</text>
  <!-- FOR-SCHLEIFE (umgedrehtes L) -->
  <rect x="70" y="220" width="580" height="40" class="box"/>
  <text x="80" y="245" class="text">Zähle i von 0 bis n, Schrittweite 1</text>
  
  <line x1="70" y1="260" x2="70" y2="380" stroke="#000" stroke-width="2"/>
  <!-- ALTERNATIVE (Briefumschlag - BW-Standard) -->
  <!-- Äußeres Rechteck -->
  <rect x="90" y="260" width="560" height="120" class="box"/>
  
  <!-- Eingebettetes Dreieck (Hypotenuse oben, Spitze unten) -->
  <polygon points="90,260 650,260 370,300" 
           fill="#fff" stroke="#000" stroke-width="2"/>
  
  <!-- Bedingung im Dreieck (obere Hälfte) -->
  <text x="370" y="278" class="text" text-anchor="middle">werte[j] &gt; werte[min_index]</text>
  
  <line x1="370" y1="300" x2="370" y2="380" stroke="#000" stroke-width="2"/>
  <text x="100" y="315" class="text bold">J</text>
  <text x="380" y="315" class="text bold">N</text>
  <!-- PROZESS -->
  <rect x="105" y="320" width="255" height="50" class="box"/>
  
  <!-- Bezeichnung -->
  <text x="115" y="338" class="text label">Zuweisung:</text>
  
  <!-- Text -->
  <text x="115" y="355" class="text">min_index = j</text>
  <line x1="70" y1="380" x2="650" y2="380" stroke="#000" stroke-width="2"/>
  <!-- ALTERNATIVE (Briefumschlag - BW-Standard) -->
  <!-- Äußeres Rechteck -->
  <rect x="70" y="380" width="580" height="210" class="box"/>
  
  <!-- Eingebettetes Dreieck (Hypotenuse oben, Spitze unten) -->
  <polygon points="70,380 650,380 360,420" 
           fill="#fff" stroke="#000" stroke-width="2"/>
  
  <!-- Bedingung im Dreieck (obere Hälfte) -->
  <text x="360" y="398" class="text" text-anchor="middle">min_index != i</text>
  
  <line x1="360" y1="420" x2="360" y2="590" stroke="#000" stroke-width="2"/>
  <text x="80" y="435" class="text bold">J</text>
  <text x="370" y="435" class="text bold">N</text>
  <!-- PROZESS -->
  <rect x="85" y="440" width="265" height="50" class="box"/>
  
  <!-- Bezeichnung -->
  <text x="95" y="458" class="text label">Deklaration und Initialisierung:</text>
  
  <!-- Text -->
  <text x="95" y="475" class="text">temp = werte[i]</text>
  <!-- PROZESS -->
  <rect x="85" y="490" width="265" height="50" class="box"/>
  
  <!-- Bezeichnung -->
  <text x="95" y="508" class="text label">Zuweisung:</text>
  
  <!-- Text -->
  <text x="95" y="525" class="text">werte[i] = werte[min_index]</text>
  <!-- PROZESS -->
  <rect x="85" y="540" width="265" height="50" class="box"/>
  
  <!-- Bezeichnung -->
  <text x="95" y="558" class="text label">Zuweisung:</text>
  
  <!-- Text -->
  <text x="95" y="575" class="text">werte[min_index] = temp</text>
  <line x1="50" y1="590" x2="650" y2="590" stroke="#000" stroke-width="2"/>
  <!-- AUSGABE -->
  <rect x="50" y="590" width="600" height="50" class="box"/>
  
  <!-- Bezeichnung -->
  <text x="60" y="608" class="text label">Ausgabe:</text>
  
  <!-- Text -->
  <text x="60" y="625" class="text">werte</text>
</svg>