<svg xmlns="http://www.w3.org/2000/svg" width="980" height="1358" viewBox="0 0 980 1358">
  <style>
    .box { stroke: #000; stroke-width: 2; fill: #fff; }
    .text { font-family: Arial, sans-serif; font-size: 13px; fill: #000; }
    .label { font-size: 11px; fill: #666; }
    .bold { font-weight: bold; }
  </style>
  <text x="490" y="30" class="text bold" text-anchor="middle" font-size="16">Temp Render (Block 1)</text>
  <line x1="30" y1="50" x2="950" y2="50" stroke="#000" stroke-width="1"/>
  <rect x="40" y="70" width="900" height="52" class="box"/>
  <text x="50" y="88" class="text label">Deklaration und Initialisierung:</text>
  <text x="50" y="106" class="text">codes = [&quot;K1&quot;, &quot;K2&quot;, &quot;K3&quot;, &quot;K4&quot;, &quot;K5&quot;, &quot;K6&quot;, &quot;K7&quot;]</text>
  <rect x="40" y="122" width="900" height="52" class="box"/>
  <text x="50" y="140" class="text label">Deklaration und Initialisierung:</text>
  <text x="50" y="158" class="text">ziel = &quot;K6&quot;</text>
  <rect x="40" y="174" width="900" height="52" class="box"/>
  <text x="50" y="192" class="text label">Deklaration und Initialisierung:</text>
  <text x="50" y="210" class="text">links = 0</text>
  <rect x="40" y="226" width="900" height="52" class="box"/>
  <text x="50" y="244" class="text label">Deklaration und Initialisierung:</text>
  <text x="50" y="262" class="text">rechts = Anzahl der Elemente des Arrays codes - 1</text>
  <rect x="40" y="278" width="900" height="52" class="box"/>
  <text x="50" y="296" class="text label">Deklaration und Initialisierung:</text>
  <text x="50" y="314" class="text">gefunden = Falsch</text>
  <rect x="40" y="330" width="900" height="52" class="box"/>
  <text x="50" y="348" class="text label">Anweisung:</text>
  <text x="50" y="366" class="text">Wiederhole solange links &lt;= rechts und gefunden = Falsch</text>
  <rect x="60" y="382" width="880" height="52" class="box"/>
  <text x="70" y="400" class="text label">Deklaration und Initialisierung:</text>
  <text x="70" y="418" class="text">mitte = (links + rechts) // 2</text>
  <rect x="60" y="434" width="880" height="52" class="box"/>
  <text x="70" y="452" class="text label">Anweisung:</text>
  <text x="70" y="470" class="text">Wenn codes[mitte] = ziel, dann</text>
  <rect x="80" y="486" width="860" height="52" class="box"/>
  <text x="90" y="504" class="text label">Anweisung:</text>
  <text x="90" y="522" class="text">J</text>
  <rect x="100" y="538" width="840" height="52" class="box"/>
  <text x="110" y="556" class="text label">Zuweisung:</text>
  <text x="110" y="574" class="text">gefunden = Wahr</text>
  <rect x="60" y="590" width="880" height="52" class="box"/>
  <text x="70" y="608" class="text label">Anweisung:</text>
  <text x="70" y="626" class="text">, sonst</text>
  <rect x="60" y="642" width="880" height="52" class="box"/>
  <text x="70" y="660" class="text label">Anweisung:</text>
  <text x="70" y="678" class="text">N</text>
  <rect x="80" y="694" width="860" height="52" class="box"/>
  <text x="90" y="712" class="text label">Anweisung:</text>
  <text x="90" y="730" class="text">Wenn codes[mitte] &lt; ziel, dann</text>
  <rect x="100" y="746" width="840" height="52" class="box"/>
  <text x="110" y="764" class="text label">Anweisung:</text>
  <text x="110" y="782" class="text">J</text>
  <rect x="120" y="798" width="820" height="52" class="box"/>
  <text x="130" y="816" class="text label">Zuweisung:</text>
  <text x="130" y="834" class="text">rechts = mitte - 1</text>
  <rect x="80" y="850" width="860" height="52" class="box"/>
  <text x="90" y="868" class="text label">Anweisung:</text>
  <text x="90" y="886" class="text">, sonst</text>
  <rect x="80" y="902" width="860" height="52" class="box"/>
  <text x="90" y="920" class="text label">Anweisung:</text>
  <text x="90" y="938" class="text">N</text>
  <rect x="100" y="954" width="840" height="52" class="box"/>
  <text x="110" y="972" class="text label">Zuweisung:</text>
  <text x="110" y="990" class="text">links = mitte + 1</text>
  <rect x="40" y="1006" width="900" height="52" class="box"/>
  <text x="50" y="1024" class="text label">Anweisung:</text>
  <text x="50" y="1042" class="text">Wenn gefunden = Wahr, dann</text>
  <rect x="60" y="1058" width="880" height="52" class="box"/>
  <text x="70" y="1076" class="text label">Anweisung:</text>
  <text x="70" y="1094" class="text">J</text>
  <rect x="80" y="1110" width="860" height="52" class="box"/>
  <text x="90" y="1128" class="text label">Ausgabe:</text>
  <text x="90" y="1146" class="text">&quot;Treffer bei Index &quot; + mitte</text>
  <rect x="40" y="1162" width="900" height="52" class="box"/>
  <text x="50" y="1180" class="text label">Anweisung:</text>
  <text x="50" y="1198" class="text">, sonst</text>
  <rect x="40" y="1214" width="900" height="52" class="box"/>
  <text x="50" y="1232" class="text label">Anweisung:</text>
  <text x="50" y="1250" class="text">N</text>
  <rect x="60" y="1266" width="880" height="52" class="box"/>
  <text x="70" y="1284" class="text label">Ausgabe:</text>
  <text x="70" y="1302" class="text">&quot;Nicht gefunden&quot;</text>
</svg>