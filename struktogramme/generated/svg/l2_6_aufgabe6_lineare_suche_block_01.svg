<svg xmlns="http://www.w3.org/2000/svg" width="980" height="994" viewBox="0 0 980 994">
  <style>
    .box { stroke: #000; stroke-width: 2; fill: #fff; }
    .text { font-family: Arial, sans-serif; font-size: 13px; fill: #000; }
    .label { font-size: 11px; fill: #666; }
    .bold { font-weight: bold; }
  </style>
  <text x="490" y="30" class="text bold" text-anchor="middle" font-size="16">Aufgabe 6 Lineare Suche (Block 1)</text>
  <line x1="30" y1="50" x2="950" y2="50" stroke="#000" stroke-width="1"/>
  <rect x="40" y="70" width="900" height="52" class="box"/>
  <text x="50" y="88" class="text label">Deklaration und Initialisierung:</text>
  <text x="50" y="106" class="text">kunden_ids = [104, 117, 109, 123, 111, 130]</text>
  <rect x="40" y="122" width="900" height="52" class="box"/>
  <text x="50" y="140" class="text label">Deklaration und Initialisierung:</text>
  <text x="50" y="158" class="text">such_id = 123</text>
  <rect x="40" y="174" width="900" height="52" class="box"/>
  <text x="50" y="192" class="text label">Deklaration und Initialisierung:</text>
  <text x="50" y="210" class="text">i = 0</text>
  <rect x="40" y="226" width="900" height="52" class="box"/>
  <text x="50" y="244" class="text label">Deklaration und Initialisierung:</text>
  <text x="50" y="262" class="text">gefunden_index = -1</text>
  <rect x="40" y="278" width="900" height="52" class="box"/>
  <text x="50" y="296" class="text label">Anweisung:</text>
  <text x="50" y="314" class="text">Wiederhole solange i &lt; Anzahl der Elemente des Arrays kunden_ids und gefunden_index = -1</text>
  <rect x="60" y="330" width="880" height="52" class="box"/>
  <text x="70" y="348" class="text label">Anweisung:</text>
  <text x="70" y="366" class="text">Wenn kunden_ids[i] = such_id, dann</text>
  <rect x="80" y="382" width="860" height="52" class="box"/>
  <text x="90" y="400" class="text label">Anweisung:</text>
  <text x="90" y="418" class="text">J</text>
  <rect x="100" y="434" width="840" height="52" class="box"/>
  <text x="110" y="452" class="text label">Zuweisung:</text>
  <text x="110" y="470" class="text">gefunden_index = i</text>
  <rect x="80" y="486" width="860" height="52" class="box"/>
  <text x="90" y="504" class="text label">Anweisung:</text>
  <text x="90" y="522" class="text">, sonst</text>
  <rect x="80" y="538" width="860" height="52" class="box"/>
  <text x="90" y="556" class="text label">Anweisung:</text>
  <text x="90" y="574" class="text">N</text>
  <rect x="100" y="590" width="840" height="52" class="box"/>
  <text x="110" y="608" class="text label">Zuweisung:</text>
  <text x="110" y="626" class="text">i = i + 1</text>
  <rect x="40" y="642" width="900" height="52" class="box"/>
  <text x="50" y="660" class="text label">Anweisung:</text>
  <text x="50" y="678" class="text">Wenn gefunden_index &gt;= 0, dann</text>
  <rect x="60" y="694" width="880" height="52" class="box"/>
  <text x="70" y="712" class="text label">Anweisung:</text>
  <text x="70" y="730" class="text">J</text>
  <rect x="80" y="746" width="860" height="52" class="box"/>
  <text x="90" y="764" class="text label">Ausgabe:</text>
  <text x="90" y="782" class="text">&quot;Treffer bei Index &quot; + gefunden_index</text>
  <rect x="60" y="798" width="880" height="52" class="box"/>
  <text x="70" y="816" class="text label">Anweisung:</text>
  <text x="70" y="834" class="text">, sonst</text>
  <rect x="60" y="850" width="880" height="52" class="box"/>
  <text x="70" y="868" class="text label">Anweisung:</text>
  <text x="70" y="886" class="text">N</text>
  <rect x="80" y="902" width="860" height="52" class="box"/>
  <text x="90" y="920" class="text label">Ausgabe:</text>
  <text x="90" y="938" class="text">&quot;Nicht gefunden&quot;</text>
</svg>